<!--
  PAGE:     register.html  (Create Account)
  OWNER:    Person E

  WHAT THIS PAGE IS:
    The registration page. The user fills in their details to create
    a new account. Because there's no real server to write to, new users
    are saved in localStorage and merged with the seeded users when
    checking credentials.

  WHAT THE USER CAN DO HERE:
    - Fill in name, email, password, confirm password
    - Create an account and get logged in automatically
    - See errors if passwords don't match or email is taken
    - Click a link to go back to login.html

  CONNECTS TO:
    ← login.html     (arrived via "Don't have an account?" link)
    → index.html     (redirect after successful registration)
    → login.html     ("Already have an account?" link)

  YOUR JS TASK:
    - On page load: call updateCartBadge() and updateAccountIcon()
    - If isLoggedIn() → redirect to /index.html immediately
    - On "Register" button click:
        1. Read all four field values
        2. Check nothing is empty
        3. Check password === confirm password
        4. fetchJSON('/api/users.json', function(seededUsers) {
               also read any extra registered users from localStorage
               combine both lists and check the email isn't already taken
               if taken → show error
               if free  → build new user object, save to localStorage,
                          call login({ id, name, email }), redirect home
           })

  HOW TO SAVE EXTRA USERS TO LOCALSTORAGE:
    Use a key like 'bh_users_extra' and store an array of user objects.
    When checking for duplicates, check both the seededUsers array
    and whatever is in localStorage under that key.

  CSS GUIDELINES:
    - Same layout as login.html — centred card, .form-group for each field
    - Use .btn .btn-primary for the Register button, full width
    - Error and success messages follow the same pattern as login.html
    - Add page-specific styles inside the <style> block in <head>
-->
