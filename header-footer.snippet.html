<!--
  FILE:    header-footer.snippet.html
  OWNER:   Eslam-LC

  PURPOSE:
    Copy the HEADER block and FOOTER block into every page.
    The cart badge number and account icon behaviour are handled
    automatically by cart.js and user.js — you just need to call
    updateCartBadge() and updateAccountIcon() when your page loads.

  IDs that JS depends on — do not rename these:
    cart-badge           → span inside the cart link, updated by updateCartBadge()
    account-btn          → the circular account button, updated by updateAccountIcon()
    account-link         → the <a> wrapping the button, href removed when logged in
    account-dropdown     → the logout dropdown div, toggled by updateAccountIcon()
    logout-btn           → button inside the dropdown, wired by updateAccountIcon()
    feedback-open-btn    → button in footer, wired by Person E on every page
    feedback-modal-container → empty div in footer, Person E injects modal HTML here
-->
