<!--
  PAGE:     products.html  (Products Listing)
  OWNER:    Person C

  WHAT THIS PAGE IS:
    A browsable catalogue of all bakery products with filters on the side.
    Everything happens in the browser — no new requests when filtering,
    just hide/show the cards based on what the user has selected.

  WHAT THE USER CAN DO HERE:
    - Search products by name
    - Filter by category (checkboxes)
    - Filter by price range (min / max inputs)
    - Filter by minimum sales count (slider)
    - Sort by price or popularity
    - Clear all filters
    - Click a product card → goes to product-detail.html?id=X

  CONNECTS TO:
    ← index.html           (arrived from Shop Now or category links)
    → product-detail.html  (clicking any product card)

  LAYOUT:
    Left sidebar (about 250px wide): all the filters
    Right area (rest of the width): results count + sort + product grid

  SIDEBAR FILTERS TO BUILD:
    - Search bar       text input, filters by product name as you type
    - Categories       one checkbox per category, built from the product data
    - Price range      two number inputs: Min $ and Max $
    - Min sales        a range slider
    - Clear All        button that resets everything and shows all products

  PRODUCT GRID:
    Each card shows: image, name, price, rating stars, "X sold"
    Clicking the card (anywhere on it) navigates to product-detail.html?id=X

  YOUR JS TASK:
    - On page load: call updateCartBadge() and updateAccountIcon()
    - fetchJSON('/api/products.json', function(products) { ... })
    - Save the full list in a variable (you'll need it for resetting filters)
    - Write a renderGrid(list) function that clears and re-draws the grid
    - Every filter input event calls renderGrid() with the filtered subset
    - "Clear All" resets the inputs and calls renderGrid(allProducts)

  CSS GUIDELINES:
    - Use .container for the outer wrapper
    - Use .card for each product card
    - Use .btn .btn-outline for the "Clear All Filters" button
    - (suggestion) Use CSS flexbox for the two-column layout (sidebar + grid)
    - (suggestion) Product cards in the grid should use CSS grid with a fixed column count
      (e.g. repeat(3, 1fr)) so they stay aligned regardless of card height
    - Add hover effect on cardsd and a slight translateY
      so they feel clickable — add cursor: pointer too
    - Add page-specific styles inside the <style> block in <head>
-->
<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>BakeHaven — Products</title>
  <link rel="stylesheet" href="./css/header-footer.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Person C: page-specific styles go here */

    /* PAGE LAYOUT */
    .current-page {
      border-bottom: 2px solid goldenrod;
      color: goldenrod;
    }

    #page-layout {
      display: flex;
      gap: 30px;
      margin-top: 30px;
    }

    /* SIDEBAR */

    #filters-sidebar {
      width: 260px;
      background: #f6f2ef;
      padding: 20px;
      border-radius: 10px;
    }

    #filters-sidebar h3 {
      margin-bottom: 15px;
    }

    #filters-sidebar input[type="text"] {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
      margin-bottom: 15px;
    }

    #filters-sidebar label {
      display: block;
      margin-bottom: 8px;
      cursor: pointer;
    }

    #filters-sidebar input[type="checkbox"] {
      margin-right: 8px;
      accent-color: #c46b1c;
      cursor: pointer;

    }

    /* RESULTS HEADER */

    #results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    #results-header h3 {
      font-weight: 600;
    }

    /* PRODUCT GRID */

    #grid-section {
      flex: 1;
    }

    #product-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
    }

    /*   PRODUCT CARD */

    .prod-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: #333;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
      transition: 0.25s;
      display: block;
    }

    .prod-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    .prod-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    /*   CARD CONTENT */

    .prod-card h5 {
      font-size: 13px;
      color: #999;
      padding: 10px 15px 0 15px;
    }

    .prod-card h3 {
      font-size: 18px;
      padding: 5px 15px;
    }

    .prod-card h3:last-of-type {
      color: #c46b1c;
      font-weight: 600;
    }

    /* DETAILS BUTTON */

    .prod-card button {
      margin: 10px 15px 15px;
      width: calc(100% - 30px);
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #f3e6dc;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }

    .prod-card button:hover {
      background: #e2d3c6;
    }

    /* RESPONSIVE */

    @media(max-width:1000px) {

      #product-grid {
        grid-template-columns: repeat(3, 1fr);
      }

    }

    @media(max-width:700px) {

      #page-layout {
        flex-direction: column;
      }

      #filters-sidebar {
        width: 100%;
      }

      #product-grid {
        grid-template-columns: repeat(2, 1fr);
      }

    }
  </style>
</head>

<body>


  <script>
    fetch('header.html')
      .then(r => r.text())
      .then(html => document.body.insertAdjacentHTML('afterbegin', html))
  </script>

  <main class="page-main">
    <div class="container">
      <div id="page-layout">
        <!-- Left: Sidebar filters -->
        <aside id="filters-sidebar">
          <!-- TODO (Person C): search, checkboxes, price range, slider, clear button -->
        </aside>

        <!-- Right: Results + Grid -->
        <section id="grid-section">
          <div id="results-header">
            <!-- TODO (Person C): "X products found" text + sort dropdown -->
          </div>
          <div id="product-grid">
            <!-- JS injects product cards here -->
          </div>
        </section>
      </div>
    </div>
  </main>

  <script>
    fetch('footer.html')
      .then(r => r.text())
      .then(function (html) {
        document.body.insertAdjacentHTML('beforeend', html)
        initFeedbackModal()
      })
  </script>


  <script src="./js/api.js"></script>
  <script src="./js/cart.js"></script>
  <script src="./js/user.js"></script>
  <script src="./js/event.js"></script>
  <script src="./js/products-page.js"></script>
</body>

</html>
