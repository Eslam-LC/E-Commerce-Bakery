<!--
  PAGE:     cart.html  (Shopping Cart)
  OWNER:    Person D

  WHAT THIS PAGE IS:
    Shows everything the user has added to their cart.
    The cart data lives in localStorage, so it comes from getCart()
    not from the server. But you still need to fetch products.json
    to get the names, images, and prices to display.

  WHAT THE USER CAN DO HERE:
    - See all their cart items (image, name, price, quantity, subtotal)
    - Increase or decrease quantity of an item
    - Remove an item
    - See the total price
    - Go back to browsing
    - Proceed to checkout (opens in a new tab)
    - If cart is empty: see a message with a link back to products

  CONNECTS TO:
    ← Any page       (arrived via cart icon in header)
    → products.html  ("Continue Shopping" button)
    → checkout.html  ("Proceed to Checkout" — opens in new tab with target="_blank")

  YOUR JS TASK:
    - On page load: call updateCartBadge() and updateAccountIcon()
    - var cartItems = getCart()   → [ { productId, quantity }, ... ]
    - If cartItems is empty, show the empty state
    - fetchJSON('/api/products.json', function(products) { ... })
    - Match each cart item to its product using productId
    - Render the item rows with quantity +/- buttons and a remove button
    - On quantity change: call updateQuantity(productId, newQty) then re-render
    - On remove: call removeFromCart(productId) then re-render
    - Calculate and display the total by summing price × quantity for each item

  CSS GUIDELINES:
    - Centre the content with a max-width around 800px
    - Use .card for the main cart wrapper
    - Use a <table> or a series of flex rows for the item list
      (a table works well here — each row has clearly defined columns)
    - Quantity +/- buttons can be small and borderless, just numbers in a row
    - The total should be visually heavier — larger font, bold
    - "Continue Shopping" → .btn .btn-outline
    - "Proceed to Checkout" → .btn .btn-primary
    - Add page-specific styles inside the <style> block in <head>
-->
