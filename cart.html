<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>BakeHaven — Your Cart</title>
  <link rel="stylesheet" href="./css/header-footer.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      background: #f6f3ef;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      margin: 0;
    }

    .page-main .container {
      width: 80%;
      margin: 0 auto;
      padding: 0 20px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
      margin-bottom: 16px;
    }

    .cart-layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .cart-left {
      flex: 2;
    }

    .cart-right {
      flex: 1;
    }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 16px;
    }

    .cart-item img {
      width: 90px;
      height: 90px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.10);
      background: #f6efe8;
    }

    .cart-item-info {
      flex: 1;
    }

    .item-name {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
      color: #222;
    }

    .item-desc {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 2px;
      line-height: 1.4;
    }

    .item-price {
      font-weight: 700;
      color: #c35a0a;
      font-size: 18px;
      white-space: nowrap;
      min-width: 70px;
      text-align: right;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .qty-btn-minus,
    .qty-btn-plus {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      line-height: 1;
      cursor: pointer;
    }

    .qty-btn-minus {
      border: 1.5px solid #ddd;
      background: #f5f5f5;
    }

    .qty-btn-minus:hover {
      background: #e0e0e0;
    }

    .qty-btn-plus {
      border: none;
      background: #c35a0a;
      color: white;
    }

    .qty-btn-plus:hover {
      background: #a84b08;
    }

    .qty-value {
      font-weight: 700;
      font-size: 15px;
      min-width: 24px;
      text-align: center;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 12px;
      transition: color .2s;
    }

    .remove-btn:hover {
      color: #c35a0a;
    }

    .cart-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .clear-btn {
      background: #c35a0a;
      color: white;
      border: none;
      font-size: 16px;
      padding: 12px 24px;
      border-radius: 25px;
      cursor: pointer;
      margin-left: auto;
    }

    .clear-btn:hover {
      background: #a84b08;
    }

    .order-summary {
      background: #f6efe8;
      padding: 24px;
      border-radius: 16px;
      position: sticky;
      top: 20px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .summary-row.total {
      font-weight: 700;
      font-size: 18px;
      margin: 16px 0 20px;
    }

    .summary-row.total span:last-child {
      color: #c35a0a;
    }

    .checkout-btn,
    .continue-btn {
      display: inline-block;
      text-align: center;
      background: #c35a0a;
      color: white;
      padding: 14px 28px;
      border-radius: 25px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-decoration: none;
      margin-top: 10px;
    }

    .checkout-btn:hover,
    .continue-btn:hover {
      background: #a84b08;
    }

    .empty-state {
      text-align: center;
      padding: 60px 0;
    }

    .empty-state p {
      font-size: 18px;
      margin-bottom: 20px;
      color: #888;
    }
  </style>
</head>

<body>

  <header class="site-header">
    <div class="container flex-between">

      <div class="header-logo">
        <div class="dark-bg">
          <svg width="200" height="72" viewBox="0 0 200 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M 60 28 Q 100 8 140 28" stroke="#BD590E" stroke-width="1.2" fill="none" stroke-linecap="round"
              opacity="0.7" />
            <circle cx="60" cy="28" r="2" fill="#BD590E" opacity="0.6" />
            <circle cx="80" cy="17" r="2" fill="#BD590E" opacity="0.6" />
            <circle cx="100" cy="13" r="2.5" fill="#BD590E" />
            <circle cx="120" cy="17" r="2" fill="#BD590E" opacity="0.6" />
            <circle cx="140" cy="28" r="2" fill="#BD590E" opacity="0.6" />
            <text x="100" y="46" text-anchor="middle" font-family="'Playfair Display', serif" font-weight="700"
              font-size="26" fill="#333" letter-spacing="8">BAKE</text>
            <line x1="52" y1="52" x2="148" y2="52" stroke="#BD590E" stroke-width="0.8" opacity="0.6" />
            <text x="100" y="66" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-weight="300"
              font-size="14" fill="#BD590E" letter-spacing="10">HAVEN</text>
          </svg>
        </div>
      </div>

      <nav>
        <ul class="header-nav">
          <li><a href="./index.html">Home</a></li>
          <li><a href="./products.html">Products</a></li>
        </ul>
      </nav>

      <div class="header-actions">
        <a href="./cart.html" class="cart-link fa fa-cart-shopping">
          <span id="cart-badge">0</span>
        </a>

        <div style="position:relative;">
          <a href="./login.html" id="account-link">
            <button class="account-btn fa-solid fa-user" id="account-btn"></button>
          </a>

          <div class="account-dropdown" id="account-dropdown">
            <button id="logout-btn">Logout</button>
          </div>
        </div>

      </div>
    </div>
  </header>

  <main class="page-main">
    <div class="container">
      <h1>Your Cart</h1>

      <div id="cart-content">

      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="flex-between">

        <div class="footer-col">
          <h4>Contact</h4>
          <p>contact@bakehaven.com</p>
          <p>+20 15 5555 0199</p>
          <p>+20 2 2555 0199</p>
        </div>

        <div class="footer-col">
          <h4>Social Media</h4>
          <ul>
            <li><a href="">Instagram</a></li>
            <li><a href="">TikTok</a></li>
            <li><a href="">Facebook</a></li>
          </ul>
        </div>

        <div class="footer-col">
          <h4>Feedback</h4>
          <p>We'd love to hear from you.</p>
          <button class="btn btn-outline" id="feedback-btn">Send Feedback</button>
        </div>

      </div>

      <div class="footer-bottom">&copy; 2026 BakeHaven. All rights reserved.</div>

    </div>
  </footer>

  <script src="./js/api.js"></script>
  <script src="./js/cart.js"></script>
  <script src="./js/user.js"></script>
  <script src="./js/event.js"></script>
</body>

</html>
