<!--
  PAGE:     checkout.html
  OWNER:    Person A (Eslam-LC)

  LAYOUT:   Two-column (Stitch-inspired)
              Left  (~58%): contact info + shipping address + payment method
              Right (~42%): compact itemized order summary (sticky)

  FLOWS:
    Logged-in  → contact section shows name + email + logout button
                 address + payment forms shown
                 "Complete Purchase" → 2s delay → clearCart() + decrementStock() → success view
    Guest      → contact section shows email input
                 address + payment forms shown
                 same completion flow

  CONNECTS TO:
    ← cart.html      (opened via "Proceed to Checkout" target="_blank")
    → index.html     ("Return to Store" — tries window.close() first)

  DEPENDS ON: css/header-footer.css, js/api.js, js/cart.js, js/user.js
  SERVER:     Serve via python -m http.server 8000 or GitHub Pages
-->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | BakeHaven</title>
  <link rel="stylesheet" href="./css/header-footer.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="./css/checkout.css">
</head>

<body>

  <script>
    fetch('header.html')
      .then(r => r.text())
      .then(html => document.body.insertAdjacentHTML('afterbegin', html))
  </script>

  <!-- CHECKOUT PROCESSING / SUCCESS OVERLAY -->
  <div id="checkout-overlay">
    <div class="spinner" id="overlay-spinner"></div>
    <i class="fa fa-circle-check overlay-icon" id="overlay-icon" style="display:none;"></i>
    <div class="overlay-title" id="overlay-title">Processing payment…</div>
    <div class="overlay-subtitle" id="overlay-subtitle">Please wait while we confirm your order.</div>
    <button class="btn btn-primary" id="overlay-return-btn" style="display:none; margin-top:10px;"
      onclick="returnToStore()">
      Return to Store
    </button>
  </div>

  <!-- MAIN -->
  <main class="page-main">
    <div class="checkout-wrapper">

      <!-- ═══ LEFT COLUMN ═══════════════════════════════════════ -->
      <div>
        <!-- Breadcrumb -->
        <nav class="breadcrumb">
          <a href="cart.html">Cart</a>
          <i class="fa fa-chevron-right"></i>
          <span class="current">Checkout</span>
        </nav>

        <h1 class="checkout-title">Checkout</h1>

        <!-- Contact Information -->
        <div class="checkout-section">
          <h2>Contact Information</h2>
          <div id="contact-section">
            <!-- JS renders either logged-in card or email input here -->
          </div>
        </div>

        <!-- Shipping Address -->
        <div class="checkout-section">
          <h2>Shipping Address</h2>
          <div class="address-grid">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" id="ship-fname" placeholder="Jane">
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" id="ship-lname" placeholder="Smith">
            </div>
            <div class="form-group full-width">
              <label>Address</label>
              <input type="text" id="ship-address" placeholder="123 Sourdough Lane">
            </div>
            <div class="form-group full-width">
              <label>Apartment, suite, etc. (optional)</label>
              <input type="text" id="ship-apt" placeholder="Apt 4B">
            </div>
            <div class="form-group">
              <label>City</label>
              <input type="text" id="ship-city" placeholder="Cairo">
            </div>
            <div class="form-group">
              <label>Country</label>
              <input type="text" id="ship-country" placeholder="Egypt">
            </div>
          </div>
        </div>

        <!-- Payment Method -->
        <div class="checkout-section">
          <h2>Payment Method</h2>
          <div class="card">
            <div class="card-header">
              <div class="left">
                <i class="fa fa-credit-card"></i>
                Credit Card
              </div>
              <div style="display:flex; gap:8px; opacity:0.4; font-size:20px;">
                <i class="fa-brands fa-cc-visa"></i>
                <i class="fa-brands fa-cc-mastercard"></i>
              </div>
            </div>
            <div class="card-body">
              <div class="form-group card-number-wrap">
                <label>Card Number</label>
                <input type="text" id="card-number" placeholder="0000 0000 0000 0000" maxlength="19">
                <i class="fa fa-lock"></i>
              </div>
              <div class="payment-row">
                <div class="form-group">
                  <label>Expiration Date</label>
                  <input type="text" id="card-expiry" placeholder="MM / YY" maxlength="7">
                </div>
                <div class="form-group">
                  <label>CVV</label>
                  <input type="text" id="card-cvv" placeholder="123" maxlength="4">
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Complete Purchase button -->
        <button class="btn btn-primary complete-btn" id="complete-btn" onclick="completePurchase()">
          <i class="fa fa-bag-shopping"></i>
          <span id="complete-btn-label">Complete Purchase</span>
        </button>
        <p class="secure-note">
          <i class="fa fa-shield-halved"></i>
          Encrypted and secure checkout
        </p>

      </div>

      <!-- ═══ RIGHT COLUMN — Order Summary ══════════════════════ -->
      <aside class="order-summary">
        <h2>Order Summary</h2>

        <!-- Compact itemized list — JS renders this -->
        <div class="order-items" id="order-items-list">
          <div class="order-empty">Loading cart…</div>
        </div>

        <!-- Charity donation -->
        <div class="donation-row">
          <div class="donation-label">
            <i class="fa fa-heart"></i>
            <span>Donate to charity?</span>
          </div>
          <div class="donation-options">
            <button class="donation-btn" data-amount="1" onclick="selectDonation(this)">$1</button>
            <button class="donation-btn" data-amount="2" onclick="selectDonation(this)">$2</button>
            <button class="donation-btn" data-amount="5" onclick="selectDonation(this)">$5</button>
            <button class="donation-btn" data-amount="0" onclick="selectDonation(this)">None</button>
          </div>
        </div>
        <!-- Pricing breakdown -->
        <div class="pricing-breakdown">
          <div class="pricing-row">
            <span class="label">Subtotal</span>
            <span class="value" id="summary-subtotal">—</span>
          </div>
          <div class="pricing-row">
            <span class="label">Shipping</span>
            <span class="value" id="summary-shipping">$4.50</span>
          </div>
          <div class="pricing-row">
            <span class="label">Donation</span>
            <span class="value" id="summary-donation">—</span>
          </div>
          <div class="pricing-total">
            <span>Total</span>
            <span class="total-amount" id="summary-total">—</span>
          </div>
        </div>
      </aside>

    </div>
  </main>

  <script>

    fetch('footer.html')
      .then(r => r.text())
      .then(function (html) {
        document.body.insertAdjacentHTML('beforeend', html)
        initFeedbackModal()
      })

  </script>

  <script src="./js/api.js"></script>
  <script src="./js/cart.js"></script>
  <script src="./js/user.js"></script>
  <script src="./js/event.js"></script>
  <script src="./js/checkout.js"></script>
</body>

</html>
