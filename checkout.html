<!--
  PAGE:     checkout.html  (Checkout)
  OWNER:    Person E

  WHAT THIS PAGE IS:
    The final step before "purchasing". It opens in a new tab.
    It behaves differently depending on whether the user is logged in.
    After the simulated payment, the cart is cleared and stock is decremented.

  WHAT THE USER CAN DO HERE:
    (if logged in)
      - See their email address
      - Watch a "processing payment" message for 2 seconds
      - See a success message and a "Return to Store" button

    (if not logged in / guest)
      - Fill in email, name, address
      - Submit the form
      - Watch a "processing payment" message for 2 seconds
      - See a success message and a "Return to Store" button

  CONNECTS TO:
    ← cart.html      (arrived via "Proceed to Checkout" — this tab was opened)
    → index.html     ("Return to Store" button — tries to close tab, falls back to home)

  YOUR JS TASK:
    - On page load: call updateCartBadge() and updateAccountIcon()
    - var cartItems = getCart()
    - If cartItems is empty → show "Nothing to checkout" message
    - If isLoggedIn():
        show "Logged in as [email]" message
        show "Redirecting to payment gateway..."
        setTimeout 2000ms then:
          for each item in cartItems → call decrementStock(item.productId, item.quantity)
          call clearCart()
          show success message + Return to Store button
    - If not logged in:
        show the guest form
        on form submit:
          save guest info to localStorage (key: 'bh_guest_checkout')
          show "Redirecting to payment gateway..."
          setTimeout 2000ms then:
            same decrement + clearCart + success as above

    - "Return to Store" button:
        window.close()   ← closes the tab if it was opened by another tab
        if that doesn't work: window.location.href = '/index.html'

  CSS GUIDELINES:
    - Very minimal page — centred card, max-width around 500px
    - Use .card and .flex-center on the main wrapper
    - Use .form-group for each guest form field
    - Use .btn .btn-primary for the submit and return buttons
    - The "processing" and "success" messages should replace the form content
      not appear alongside it — hide the form, show the message
    - Add page-specific styles inside the <style> block in <head>
-->
